body:
  text: 祇洹圖經序蓋聞蒼生敬福之肇歸真之基起立支提景仰塔像其績實皇矣至如給孤布黃金於祇陀之園優填雕栴檀於牟尼之像建乎爪髮兩塔衣影二臺並皆如來在日既見成軌且夫真身無形因感故彰感既有差池形應亦有殊若乃心路隔絶則真儀無應至諴精誠則變動天地昔者平仲憂大旱自焚火起而雨至杞婦哭梁殖之尸莒城為之崩由是觀之神依物感豈曰虛哉釋教東漸咸歸風化形像塔廟每懸競列洎乎像末之運法教衰替人情浮薄製造無範輕慢於是乎生禮敬於是乎廢粵若有覺人號曰南山教主澄照大師利見震旦應肇律主天地同其大德日月合厥重光玄關幽鍵感而遂通遠源浚波酌而不竭龍鬼歸仰天人擎足烏呼我祖之麗德豈可得稱乎而泛愛不捨物恐後世造塔廟無所表彰竊據靈感製祇洹圖經雙卷矣叔世懷道之士無有出乎玉關超乎蒼嶺繫索攀杙之勞宛然如視聖迹者匪此經之益耶當大宋之曆雖律風勃興此經既喪矣我大智律師邂逅遇乎日域將至矣方今漢地再有斯書吾國之為也余偶雖得乎一本繕脫湮滅書誤絡繹每披卷未嘗不喟然而歎矣頃載有故移偶乎石清水神宮寺大乘律院苾芻實長謂余云經坊之中祇洹圖經舊本全者有焉京兆書堂未有此經以命剞劂氏壽梓布遐邇請安一語於卷首余云吁咈我鄙陋之言何贅乎聖策矣長云寶珠觸於按劍良馬羸乎駔闠者為無因而至故也嗚乎何遜謙之甚哉余感斯言遂不得固辭操翰書焉時天和元年龍集辛酉臘朔久修園律院比丘宗覺直謹識中天竺舍衛國祇洹寺圖經序唐乾封二年季春終南山釋氏感靈所出夫寺塔之基其源遠矣自賢劫創啓諸佛告成引四生而開三聖引五乘而會一極莫不以革俗為出有之本通理為入空之致故使權圖匪定而義實斯顯所以道場別住木石土宇周徼短長院坊小大僧佛位殊故設置斯別凡聖性異故禮供分倫重門洞開啓三七之嘉謂林池交映引四八之康途表稱既彰其尊亦穆故十方清信歸迹雲集九界靈祇投誠霧結至於六師異道傾影覆之威奇四俗懷生得真教之雅趣斯並古佛之行事故蟻窟而猶存流施不窮致來聖而同襲然即世相不停陵谷交資能事斯復故接非常今則大野丘墟同黍離之永歎遺基茫昧顧寒露而深淒自告隱兩河歸真雙樹法流振旦方聞勝蹤而法勇法盛之儔道邃道生之侶憤發精爽慷慨未聞視死若生追蹤高軌既達故地止見遺塵雅相雖繁終傳往迹莫若面覩用啓幽心但以昔緣未絶冥威有從天人及殊聞義便舉敢以所述用陳幽鏡遂蒙照示圖而傳之自大聖入寂以來千六百歲祇園興廢經二十返增損備缺事出當機故使圖傳紛綸藉以定斷其中高者三度殊絶自餘締構未足稱言隋初魏郡靈裕法師名行夙彰風操貞遠撰述寺誥具引祇洹然以人代寂寥經籍罕備法律通會緣敘未倫然則布金留樹重閣層門七日而騰架於千畝鐘鑌而各聲於百院語斯大然事𩣵常經莫非統機之緣天人助其成務通感之義龍鬼贊其神功昔聞輪皇建塔一時而興八萬大士化物大室納於兩儀豈惟人謀乃䈴玄承草創今則無從此所傳者生在初天即南天王之大將八之一也見始及終止過晦朔親受遺寄弘護在懷慈濟無蒙非其視聽流此圖經傳之後葉庶或見者知有所歸輒録由來無昧宗緒余以祇洹本寺主久所居二十五年一期化迹七處八會之鴻業形不從於此園五部四含之玄藉法多從於斯寺由是搜採群篇特事通敘但以出沒不同懷鉛未即忽於覺悟感此幽靈積年沈鬱霈然頓寫然夫冥隱微顯備聞前絶于寶搜神之録劉慶幽明之篇祖台志怪之書王琰冥祥之記廣張往往未若指掌流俗佌璅之儔或生果論未達通方之臣昌斯傳不足以聞又有旌異述異之作冥報顯報之書額敘煩攝光問古今余即所列事等文宣天王之録亦同建安石佛之作覺夢雖異不足懷疑恨以八十位年情爽頓絶面藉指授耳聆曲誨及至修疏十不存一紬絡圖傳發未聞想諸同儔恕其梗概之云爾
